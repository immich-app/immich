[tools]
python = "3.11"
uv = "0.8.15"

[tasks.install]
run = "uv sync --locked"

[tasks.lint]
run = "uv run ruff check immich_ml"

[tasks.test]
run = "uv run pytest --cov=immich_ml --cov-report term-missing"

[tasks.format]
run = "uv run ruff format immich_ml"

[tasks.check]
run = "uv run mypy --strict immich_ml/"

[tasks.ci-unit]
run = [
  { task = ":install --extra cpu" },
  { task = ":format" },
  { task = ":lint --output-format=github" },
  { task = ":check" },
  { task = ":test" },
]

[tasks.checklist]
run = [
  { task = ":install" },
  { task = ":format" },
  { task = ":lint" },
  { task = ":check" },
  { task = ":test" },
]

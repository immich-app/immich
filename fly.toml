app = 'immich-server'
primary_region = 'ord'

[build]
  dockerfile = 'server/Dockerfile'

[env]
  # DATABASE_URL is set as a secret via Fly Managed Postgres (immich-pg)
  # To attach: fly mpg attach <cluster-id> -a immich-server
  IMMICH_ENV = 'production'
  IMMICH_IGNORE_MOUNT_CHECK_ERRORS = 'true'
  IMMICH_LOG_LEVEL = 'log'
  IMMICH_MACHINE_LEARNING_URL = 'http://ml-immich.flycast:3003'
  IMMICH_MEDIA_LOCATION = '/tmp/upload'
  IMMICH_CONFIG_FILE = '/etc/immich/config.yaml'
  REDIS_HOSTNAME = 'immich-dragonfly.internal'
  REDIS_PORT = '6379'
  STORAGE_S3_ENABLED = 'true'
  STORAGE_S3_BUCKET = 'user-media'
  STORAGE_S3_ENDPOINT = 'https://t3.storage.dev'
  STORAGE_S3_PREFIX = 'users/'
  STORAGE_S3_REGION = 'auto'
  # OAuth config via secrets

# Per-process-group queue assignments
# Video worker - CPU intensive FFmpeg transcoding
[[env]]
  IMMICH_QUEUES_INCLUDE = 'videoConversion'
  processes = ['worker-video']

# Thumbnail worker - image processing (ImageMagick/Sharp)
[[env]]
  IMMICH_QUEUES_INCLUDE = 'assetThumbnailGeneration,personThumbnailGeneration'
  processes = ['worker-thumb']

# I/O worker - S3 uploads, metadata extraction, sidecar processing
[[env]]
  IMMICH_QUEUES_INCLUDE = 's3Upload,encryption,metadataExtraction,sidecar'
  processes = ['worker-io']

# General worker - background tasks, library scanning, notifications, etc.
[[env]]
  IMMICH_QUEUES_INCLUDE = 'backgroundTask,library,search,migration,workflow,notifications,backupDatabase,storageTemplateMigration'
  processes = ['worker-general']

# Process groups - different startup commands
# Each worker group processes specific queues via IMMICH_QUEUES_INCLUDE
[processes]
  web = "start-web.sh"
  worker-video = "start-worker.sh"
  worker-thumb = "start-worker.sh"
  worker-io = "start-worker.sh"
  worker-general = "start-worker.sh"

# HTTP service - only web machines handle traffic
[http_service]
  internal_port = 2283
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

  [http_service.concurrency]
    type = 'requests'
    soft_limit = 100
    hard_limit = 150

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    timeout = "5s"
    method = "GET"
    path = "/api/server/ping"

# Machine-level health check for web (in addition to http_service check)
[[checks]]
  name = "health"
  port = 2283
  type = "http"
  interval = "15s"
  timeout = "5s"
  grace_period = "30s"
  method = "GET"
  path = "/api/server/ping"
  processes = ["web"]

# Web machines - lighter, always available
[[vm]]
  processes = ["web"]
  memory = '2gb'
  cpus = 2
  cpu_kind = "shared"

# Video worker - large for FFmpeg transcoding (CPU intensive)
[[vm]]
  processes = ["worker-video"]
  memory = '8gb'
  cpus = 4
  cpu_kind = "performance"

# Thumbnail worker - medium for image processing
[[vm]]
  processes = ["worker-thumb"]
  memory = '4gb'
  cpus = 2
  cpu_kind = "performance"

# I/O worker - medium, mostly network bound (S3 uploads, metadata)
[[vm]]
  processes = ["worker-io"]
  memory = '4gb'
  cpus = 2
  cpu_kind = "shared"

# General worker - small for light background tasks
[[vm]]
  processes = ["worker-general"]
  memory = '2gb'
  cpus = 1
  cpu_kind = "shared"

# Give workers time to finish current job before SIGKILL (matches 10-min lock duration)
# This applies to all process groups but only affects workers (web shuts down quickly)
kill_timeout = "660s"
kill_signal = "SIGTERM"

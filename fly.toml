app = 'immich-server'
primary_region = 'ord'

[build]
  dockerfile = 'server/Dockerfile'

[env]
  # DATABASE_URL is set as a secret via Fly Managed Postgres (immich-pg)
  # To attach: fly mpg attach <cluster-id> -a immich-server
  IMMICH_ENV = 'production'
  IMMICH_IGNORE_MOUNT_CHECK_ERRORS = 'true'
  IMMICH_LOG_LEVEL = 'log'
  IMMICH_MACHINE_LEARNING_URL = 'http://ml-immich.flycast:3003'
  IMMICH_MEDIA_LOCATION = '/tmp/upload'
  IMMICH_CONFIG_FILE = '/etc/immich/config.yaml'
  REDIS_HOSTNAME = 'immich-dragonfly.internal'
  REDIS_PORT = '6379'
  STORAGE_S3_ENABLED = 'true'
  STORAGE_S3_ARCHIVE_BUCKET = 'user-media'
  STORAGE_S3_HOT_BUCKET = 'user-media'
  STORAGE_S3_ENDPOINT = 'https://t3.storage.dev'
  STORAGE_S3_PREFIX = 'users/'
  STORAGE_S3_REGION = 'auto'
  # OAuth config via secrets

# Web = API only, Worker = job processing only
# Uses upstream IMMICH_WORKERS_INCLUDE/EXCLUDE env vars
[processes]
  web = "env IMMICH_WORKERS_EXCLUDE=microservices start.sh"
  worker = "env IMMICH_WORKERS_INCLUDE=microservices start.sh"

# HTTP service - Fly proxy auto-starts/stops web machines on traffic
# Workers are scaled by immich-autoscaler based on queue depth
[http_service]
  internal_port = 2283
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

  [http_service.concurrency]
    type = 'requests'
    soft_limit = 100
    hard_limit = 150

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    timeout = "5s"
    method = "GET"
    path = "/api/server/ping"

# Machine-level health check (web only - workers don't serve HTTP)
[[checks]]
  name = "health"
  port = 2283
  type = "http"
  interval = "15s"
  timeout = "5s"
  grace_period = "30s"
  method = "GET"
  path = "/api/server/ping"
  processes = ["web"]

# Web: lightweight API server
[[vm]]
  processes = ["web"]
  memory = '2gb'
  cpus = 1
  cpu_kind = "shared"

# Worker: heavier job processing (video transcoding, thumbnails, etc.)
[[vm]]
  processes = ["worker"]
  memory = '8gb'
  cpus = 8
  cpu_kind = "shared"

# Give workers time to finish current job before SIGKILL (matches 10-min lock duration)
kill_timeout = "660s"
kill_signal = "SIGTERM"

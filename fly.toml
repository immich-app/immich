app = 'immich-server'
primary_region = 'ord'

[build]
  dockerfile = 'server/Dockerfile'

[env]
  # DATABASE_URL is set as a secret via Fly Managed Postgres (immich-pg)
  # To attach: fly mpg attach <cluster-id> -a immich-server
  IMMICH_ENV = 'production'
  IMMICH_IGNORE_MOUNT_CHECK_ERRORS = 'true'
  IMMICH_LOG_LEVEL = 'log'
  IMMICH_MACHINE_LEARNING_URL = 'http://ml-immich.flycast:3003'
  IMMICH_MEDIA_LOCATION = '/tmp/upload'
  IMMICH_CONFIG_FILE = '/etc/immich/config.yaml'
  REDIS_HOSTNAME = 'immich-dragonfly.internal'
  REDIS_PORT = '6379'
  STORAGE_S3_ENABLED = 'true'
  STORAGE_S3_BUCKET = 'user-media'
  STORAGE_S3_ENDPOINT = 'https://t3.storage.dev'
  STORAGE_S3_PREFIX = 'users/'
  STORAGE_S3_REGION = 'auto'
  # OAuth config via secrets

# Single process group - each machine runs API + all workers
# Jobs are processed locally using machine-prefixed queues
# Scaling is handled by Fly's HTTP-based autoscaling
[processes]
  app = "start.sh"

# HTTP service with Fly autoscaling
[http_service]
  internal_port = 2283
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = 'requests'
    soft_limit = 100
    hard_limit = 150

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    timeout = "5s"
    method = "GET"
    path = "/api/server/ping"

# Machine-level health check
[[checks]]
  name = "health"
  port = 2283
  type = "http"
  interval = "15s"
  timeout = "5s"
  grace_period = "30s"
  method = "GET"
  path = "/api/server/ping"
  processes = ["app"]

# Single VM config - sized for both API and worker tasks
[[vm]]
  processes = ["app"]
  memory = '4gb'
  cpus = 2
  cpu_kind = "performance"

# Give workers time to finish current job before SIGKILL (matches 10-min lock duration)
# This applies to all process groups but only affects workers (web shuts down quickly)
kill_timeout = "660s"
kill_signal = "SIGTERM"

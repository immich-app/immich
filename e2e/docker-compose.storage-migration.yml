services:
  minio:
    container_name: immich-e2e-minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - 9000:9000
      - 9001:9001
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9000/minio/health/live || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10

  immich-server:
    volumes:
      - upload-data:/usr/src/app/upload
    environment:
      IMMICH_STORAGE_BACKEND: ${IMMICH_STORAGE_BACKEND:-disk}
      IMMICH_S3_BUCKET: immich-test
      IMMICH_S3_ENDPOINT: http://minio:9000
      IMMICH_S3_ACCESS_KEY_ID: minioadmin
      IMMICH_S3_SECRET_ACCESS_KEY: minioadmin
      IMMICH_S3_REGION: us-east-1
      IMMICH_S3_SERVE_MODE: proxy
    depends_on:
      minio:
        condition: service_healthy

volumes:
  upload-data:

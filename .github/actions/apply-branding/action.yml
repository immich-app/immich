name: Apply Branding
description: Replaces Immich branding with Noodle Gallery before build

inputs:
  version:
    description: 'Fork version to stamp (e.g. v4.8.0). Falls back to git describe if not set.'
    required: false

runs:
  using: composite
  steps:
    - name: Install jq
      shell: bash
      run: |
        if ! command -v jq &>/dev/null; then
          sudo apt-get update && sudo apt-get install -y jq
        fi

    - name: Apply branding overlay
      shell: bash
      env:
        FORK_VERSION: ${{ inputs.version }}
      run: ./branding/scripts/apply-branding.sh

    - name: Verify branding applied
      shell: bash
      run: ./branding/scripts/verify-branding.sh

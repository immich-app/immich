name: Apply Branding
description: Replaces Immich branding with Noodle Gallery before build

inputs:
  version:
    description: 'Fork version to stamp (e.g. v4.8.0). Falls back to git describe if not set.'
    required: false
  build_number:
    description: 'Mobile build number (versionCode). Falls back to 1 if not set.'
    required: false

runs:
  using: composite
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        if [[ "$RUNNER_OS" == "macOS" ]]; then
          brew install jq coreutils gnu-sed imagemagick 2>/dev/null || true
        else
          packages=()
          if ! command -v jq &>/dev/null; then
            packages+=(jq)
          fi
          if ! command -v identify &>/dev/null || { ! command -v convert &>/dev/null && ! command -v magick &>/dev/null; }; then
            packages+=(imagemagick)
          fi
          if (( ${#packages[@]} > 0 )); then
            sudo apt-get update
            sudo apt-get install -y "${packages[@]}"
          fi
        fi

    - name: Apply branding overlay
      shell: bash
      env:
        FORK_VERSION: ${{ inputs.version }}
        BUILD_NUMBER: ${{ inputs.build_number }}
      run: |
        if [[ "$RUNNER_OS" == "macOS" ]]; then
          export PATH="/opt/homebrew/opt/gnu-sed/libexec/gnubin:/opt/homebrew/opt/coreutils/libexec/gnubin:$PATH"
        fi
        ./branding/scripts/apply-branding.sh

    - name: Verify branding applied
      shell: bash
      run: ./branding/scripts/verify-branding.sh

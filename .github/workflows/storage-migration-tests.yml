name: Storage Migration Tests

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: {}

permissions: {}

jobs:
  storage-migration:
    name: Storage Migration E2E
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./e2e
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.storage-migration.yml
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: 'recursive'

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: './e2e/.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install e2e dependencies
        run: pnpm install --frozen-lockfile

      # ---------------------------------------------------------------
      # Phase group 1: backend=disk — setup and estimate
      # ---------------------------------------------------------------
      - name: Start stack (backend=disk)
        run: |
          IMMICH_STORAGE_BACKEND=disk \
          docker compose up -d --build --renew-anon-volumes --force-recreate --remove-orphans --wait --wait-timeout 300

      - name: Create MinIO bucket
        run: |
          docker compose exec -T minio mc alias set local http://localhost:9000 minioadmin minioadmin
          docker compose exec -T minio mc mb local/immich-test --ignore-existing

      - name: 'Phase: setup'
        run: pnpm tsx src/storage-migration.ts setup

      - name: 'Phase: estimate'
        run: pnpm tsx src/storage-migration.ts estimate

      # ---------------------------------------------------------------
      # Phase group 2: backend=s3 — migrate to S3, verify, rollback
      # ---------------------------------------------------------------
      - name: Restart server (backend=s3)
        run: |
          IMMICH_STORAGE_BACKEND=s3 \
          docker compose up -d --no-deps --force-recreate --wait --wait-timeout 120 immich-server

      - name: 'Phase: migrate-to-s3'
        run: pnpm tsx src/storage-migration.ts migrate-to-s3

      - name: 'Phase: no-files'
        run: pnpm tsx src/storage-migration.ts no-files

      - name: 'Phase: content-verify'
        run: pnpm tsx src/storage-migration.ts content-verify

      - name: 'Phase: sidecar-verify'
        run: pnpm tsx src/storage-migration.ts sidecar-verify

      - name: 'Phase: rollback'
        run: pnpm tsx src/storage-migration.ts rollback

      # ---------------------------------------------------------------
      # Phase group 3: backend=s3 — re-migrate after rollback, concurrent
      # ---------------------------------------------------------------
      - name: 'Phase: migrate-to-s3 (after rollback)'
        run: pnpm tsx src/storage-migration.ts migrate-to-s3

      - name: 'Phase: concurrent-rejection'
        run: pnpm tsx src/storage-migration.ts concurrent-rejection

      # ---------------------------------------------------------------
      # Phase group 4: backend=disk — migrate back to disk
      # ---------------------------------------------------------------
      - name: Restart server (backend=disk)
        run: |
          IMMICH_STORAGE_BACKEND=disk \
          docker compose up -d --no-deps --force-recreate --wait --wait-timeout 120 immich-server

      - name: 'Phase: migrate-to-disk'
        run: pnpm tsx src/storage-migration.ts migrate-to-disk

      # ---------------------------------------------------------------
      # Phase group 5: backend=s3 — selective migration
      # ---------------------------------------------------------------
      - name: Restart server (backend=s3)
        run: |
          IMMICH_STORAGE_BACKEND=s3 \
          docker compose up -d --no-deps --force-recreate --wait --wait-timeout 120 immich-server

      - name: 'Phase: selective-to-s3'
        run: pnpm tsx src/storage-migration.ts selective-to-s3

      - name: 'Phase: selective-cleanup'
        run: pnpm tsx src/storage-migration.ts selective-cleanup

      # ---------------------------------------------------------------
      # Phase group 6: backend=disk — migrate back for delete-source-false
      # ---------------------------------------------------------------
      - name: Restart server (backend=disk)
        run: |
          IMMICH_STORAGE_BACKEND=disk \
          docker compose up -d --no-deps --force-recreate --wait --wait-timeout 120 immich-server

      - name: 'Phase: migrate-to-disk'
        run: pnpm tsx src/storage-migration.ts migrate-to-disk

      # ---------------------------------------------------------------
      # Phase group 7: backend=s3 — delete-source-false
      # ---------------------------------------------------------------
      - name: Restart server (backend=s3)
        run: |
          IMMICH_STORAGE_BACKEND=s3 \
          docker compose up -d --no-deps --force-recreate --wait --wait-timeout 120 immich-server

      - name: 'Phase: delete-source-false'
        run: pnpm tsx src/storage-migration.ts delete-source-false

      # ---------------------------------------------------------------
      # Cleanup and logs
      # ---------------------------------------------------------------
      - name: Capture Docker logs
        if: always()
        run: docker compose logs --no-color > docker-compose-logs.txt

      - name: Archive Docker logs
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always()
        with:
          name: storage-migration-docker-logs
          path: e2e/docker-compose-logs.txt

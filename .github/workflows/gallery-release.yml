name: Release Gallery P2

# Phase 2 of the split release cycle. Reads the draft release created by
# gallery-release-mobile.yml, builds server + ML at the pinned SHA, moves the
# `release` / `vN` floating tags, promotes the draft, and publishes the
# version endpoint. See
# docs/plans/2026-04-17-split-mobile-server-release-design.md.

on:
  workflow_dispatch:

concurrency:
  group: gallery-release-server
  cancel-in-progress: false

permissions: {}

jobs:
  discover:
    name: Discover Pending Release Draft
    runs-on: ubuntu-latest
    # contents: write is REQUIRED so the token can see draft releases.
    # GitHub returns drafts only to tokens with write permission.
    permissions:
      contents: write
    outputs:
      version: ${{ steps.discover.outputs.version }}
      sha: ${{ steps.discover.outputs.sha }}
      major: ${{ steps.discover.outputs.major }}
    steps:
      - name: Require main branch
        env:
          REF: ${{ github.ref_name }}
        run: |
          if [[ "$REF" != "main" ]]; then
            echo "::error::Releases must be triggered from main (got: $REF)"
            exit 1
          fi

      - name: Find draft created by phase 1
        id: discover
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Composite filter: drafts whose tag matches v*.*.* AND have at least
          # one .apk asset. Same predicate phase 1's guard uses.
          candidates=$(gh release list --repo "$REPO" --limit 1000 \
            --json tagName,isDraft \
            --jq '[.[] | select(.isDraft == true and (.tagName | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$")))] | .[].tagName')
          matches=""
          for tag in $candidates; do
            count=$(gh release view "$tag" --repo "$REPO" --json assets \
              --jq '[.assets[] | select(.name | endswith(".apk"))] | length')
            if [[ "$count" -gt 0 ]]; then
              matches="$matches $tag"
            fi
          done
          matches=$(echo "$matches" | xargs || true)

          if [[ -z "$matches" ]]; then
            echo "::error::No pending mobile release draft found."
            echo "::error::Run gallery-release-mobile.yml first."
            exit 1
          fi

          read -r tag rest <<< "$matches"
          if [[ -n "$rest" ]]; then
            echo "::error::Multiple pending drafts found: $matches"
            echo "::error::Resolve before promoting."
            exit 1
          fi

          sha=$(gh release view "$tag" --repo "$REPO" --json targetCommitish --jq .targetCommitish)
          major=$(echo "$tag" | sed 's/^v//' | cut -d. -f1)

          echo "version=$tag" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "major=v${major}" >> "$GITHUB_OUTPUT"
          echo "Discovered: $tag at $sha"

  build-server:
    name: Build Server (${{ matrix.platform }})
    needs: discover
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: ${{ needs.discover.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply branding
        uses: ./.github/actions/apply-branding
        with:
          version: ${{ needs.discover.outputs.version }}

      - name: Prepare platform pair
        id: prepare
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "platform-pair=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: server/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            DEVICE=cpu
            BUILD_ID=${{ github.run_id }}
            BUILD_SOURCE_REF=${{ needs.discover.outputs.version }}
            BUILD_SOURCE_COMMIT=${{ needs.discover.outputs.sha }}
          outputs: type=image,"name=ghcr.io/open-noodle/gallery-server",push-by-digest=true,name-resolution=short,push=true
          cache-from: type=gha,scope=server-${{ steps.prepare.outputs.platform-pair }}
          cache-to: type=gha,scope=server-${{ steps.prepare.outputs.platform-pair }},mode=max

      - name: Export digest
        run: | # zizmor: ignore[template-injection]
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: server-digests-${{ steps.prepare.outputs.platform-pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-server:
    name: Merge Server Manifest
    needs: [discover, build-server]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: server-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ghcr.io/open-noodle/gallery-server
          VERSION: ${{ needs.discover.outputs.version }}
          MAJOR: ${{ needs.discover.outputs.major }}
        run: |
          tags="-t ${IMAGE}:${VERSION} -t ${IMAGE}:${MAJOR} -t ${IMAGE}:release"
          sources=$(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools create ${tags} ${sources}

  build-ml:
    name: Build ML ${{ matrix.device }} (${{ matrix.platform }})
    needs: discover
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: cpu
            platform: linux/amd64
            runner: ubuntu-latest
          - device: cpu
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - device: cuda
            platform: linux/amd64
            runner: ubuntu-latest
          - device: openvino
            platform: linux/amd64
            runner: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: ${{ needs.discover.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply branding
        uses: ./.github/actions/apply-branding
        with:
          version: ${{ needs.discover.outputs.version }}

      - name: Prepare platform pair
        id: prepare
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "platform-pair=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: machine-learning
          file: machine-learning/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            DEVICE=${{ matrix.device }}
          outputs: type=image,"name=ghcr.io/open-noodle/gallery-ml",push-by-digest=true,name-resolution=short,push=true
          cache-from: type=gha,scope=ml-${{ matrix.device }}-${{ steps.prepare.outputs.platform-pair }}
          cache-to: type=gha,scope=ml-${{ matrix.device }}-${{ steps.prepare.outputs.platform-pair }},mode=max

      - name: Export digest
        run: | # zizmor: ignore[template-injection]
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ml-${{ matrix.device }}-digests-${{ steps.prepare.outputs.platform-pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-ml:
    name: Merge ML Manifest (${{ matrix.device }})
    needs: [discover, build-ml]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - device: cpu
            suffix: ''
          - device: cuda
            suffix: '-cuda'
          - device: openvino
            suffix: '-openvino'
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: ml-${{ matrix.device }}-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ghcr.io/open-noodle/gallery-ml
          VERSION: ${{ needs.discover.outputs.version }}
          MAJOR: ${{ needs.discover.outputs.major }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          tags="-t ${IMAGE}:${VERSION}${SUFFIX} -t ${IMAGE}:${MAJOR}${SUFFIX} -t ${IMAGE}:release${SUFFIX}"
          sources=$(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools create ${tags} ${sources}

  tag:
    name: Create Git Tag and Promote Release
    needs: [discover, merge-server, merge-ml]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ needs.discover.outputs.sha }}

      - name: Create tags
        env:
          VERSION: ${{ needs.discover.outputs.version }}
          SHA: ${{ needs.discover.outputs.sha }}
        run: |
          major=$(echo "$VERSION" | sed 's/^v//' | cut -d. -f1)

          # Create / update version tag (e.g. v3.0.1) at the pinned SHA.
          # -f makes phase-2 re-runs idempotent when a prior attempt pushed
          # the tag before failing downstream.
          git tag -f "$VERSION" "$SHA"

          # Update major version tag (e.g. v3) — floats to latest release
          git tag -f "v${major}" "$SHA"

          # Update release tag — always points to latest build
          git tag -f "release" "$SHA"

          git push origin "$VERSION" "v${major}" "release" --force

      - name: Upload config files
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.discover.outputs.version }}
        run: |
          set -euo pipefail
          gh release upload "$VERSION" --repo "$REPO" --clobber \
            docker/docker-compose.yml \
            docker/example.env

      - name: Promote draft release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.discover.outputs.version }}
        run: |
          set -euo pipefail
          gh release edit "$VERSION" --repo "$REPO" --draft=false --latest
          echo "Released $VERSION"

  publish-version-endpoint:
    name: Publish Version Endpoint
    needs: [discover, tag]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::660432264815:role/noodle-prod-gallery-release-version-upload
          aws-region: eu-west-1

      - name: Build and upload version.json
        env:
          VERSION: ${{ needs.discover.outputs.version }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          # Validate version format (keep v prefix for wire-format parity with upstream Immich)
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version tag: $VERSION"
            exit 1
          fi

          # Fetch published_at from the now-promoted GitHub Release.
          # Retry briefly in case of transient GH API issues immediately after promotion.
          published_at=""
          for attempt in 1 2 3; do
            published_at=$(gh release view "$VERSION" --repo "$REPO" --json publishedAt --jq .publishedAt 2>/dev/null || true)
            if [[ -n "$published_at" && "$published_at" != "null" ]]; then
              break
            fi
            echo "Attempt ${attempt}: could not read publishedAt, retrying in 5s..."
            sleep 5
          done
          if [[ -z "$published_at" || "$published_at" == "null" ]]; then
            echo "::error::Could not read publishedAt for release $VERSION after 3 attempts"
            exit 1
          fi

          printf '{"version":"%s","published_at":"%s"}' "$VERSION" "$published_at" > /tmp/gallery

          aws s3 cp /tmp/gallery s3://noodle-prod-version/gallery \
            --content-type "application/json; charset=utf-8" \
            --cache-control "public, max-age=300"

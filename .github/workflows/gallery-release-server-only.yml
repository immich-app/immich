name: Release Gallery Server-only

# Server-only release. Skips mobile entirely. Use when shipping changes
# that don't affect the mobile app (server bug fixes, web UI tweaks, docs)
# and you don't want to wait for mobile app store review.
#
# Mobile users remain on the previous version. Do NOT use this for major
# version bumps or changes that break the mobile app's API contract — ship
# those via the normal phase-1 → phase-2 flow so mobile catches up.
#
# Blocks if a pending phase-1 mobile draft exists — running server-only
# while a mobile draft is pending would collide on version numbers.
#
# See docs/plans/2026-04-17-split-mobile-server-release-design.md.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v4.50.1) — overrides auto-version'
        required: false
        type: string

concurrency:
  # Same group as phase 2 so the two never race on docker / tag / version
  # endpoint state. They serialize.
  group: gallery-release-server
  cancel-in-progress: false

permissions: {}

jobs:
  guard:
    name: Guard against pending mobile draft
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Require main or release branch
        env:
          REF: ${{ github.ref_name }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ "$REF" == "main" ]]; then
            exit 0
          fi

          if [[ "$REF" == release/* ]]; then
            if [[ -z "$VERSION" ]]; then
              echo "::error::Server-only releases from release/* branches require an explicit version input."
              exit 1
            fi

            if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Version must be a full semver tag like v4.55.2 (got: $VERSION)"
              exit 1
            fi

            echo "Release branch $REF with explicit version $VERSION. Proceeding."
            exit 0
          fi

          echo "::error::Releases must be triggered from main or release/* (got: $REF)"
          exit 1

      - name: Fail if a mobile release draft is pending
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          pending=$(gh release list --repo "$REPO" --limit 1000 \
            --json tagName,isDraft \
            --jq '[.[] | select(.isDraft == true and (.tagName | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$")))] | .[].tagName')
          matches=""
          for tag in $pending; do
            count=$(gh release view "$tag" --repo "$REPO" --json assets \
              --jq '[.assets[] | select(.name | endswith(".apk"))] | length')
            if [[ "$count" -gt 0 ]]; then
              matches="$matches $tag"
            fi
          done
          matches=$(echo "$matches" | xargs || true)
          if [[ -n "$matches" ]]; then
            echo "::error::Pending mobile release draft(s) found: $matches"
            echo "::error::A server-only release while a mobile draft is pending would collide on version numbers."
            echo "::error::Either finish the mobile release (run gallery-release.yml once mobile is live), or discard the draft:"
            echo "::error::  gh release delete <tag> --cleanup-tag --yes"
            exit 1
          fi
          echo "No pending mobile draft. Proceeding."

  version:
    name: Compute Version
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      major: ${{ steps.version.outputs.major }}
      sha: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ -n "$INPUT_VERSION" ]]; then
            major=$(echo "$INPUT_VERSION" | sed 's/^v//' | cut -d. -f1)
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
            echo "major=v${major}" >> "$GITHUB_OUTPUT"
            echo "Version: $INPUT_VERSION — manual override"
            exit 0
          fi

          prev_tag=$(git tag --list 'v*.*.*' --sort=-version:refname | head -n1)
          if [[ -z "$prev_tag" ]]; then
            echo "::error::No existing version tags found. Run a manual release first."
            exit 1
          fi

          rank_of() {
            case "$1" in
              major) echo 3 ;;
              minor) echo 2 ;;
              patch) echo 1 ;;
              *) echo 0 ;;
            esac
          }

          bump=""
          has_non_skip_commit=false
          skipped_count=0
          total_count=0

          while IFS=$'\t' read -r sha subject; do
            [[ -z "$sha" ]] && continue
            total_count=$((total_count + 1))

            pr_num=$(echo "$subject" | grep -oP '#\K[0-9]+' | tail -1 || true)
            labels=""
            if [[ -n "$pr_num" ]]; then
              labels=$(gh pr view "$pr_num" --json labels --jq '.labels[].name' 2>/dev/null || true)
            fi

            if echo "$labels" | grep -q '^changelog:skip$'; then
              skipped_count=$((skipped_count + 1))
              echo "  · ${sha:0:7} ${subject}  [skip]"
              continue
            fi

            has_non_skip_commit=true
            commit_bump="patch"

            if echo "$labels" | grep -q '^changelog:feat$'; then
              commit_bump="minor"
            fi

            if echo "$subject" | grep -qP '^[a-z]+(\([^)]+\))?!:'; then
              commit_bump="major"
            elif echo "$subject" | grep -qP '^feat(\([^)]+\))?:'; then
              [[ "$commit_bump" == "patch" ]] && commit_bump="minor"
            fi

            if [[ -z "$bump" ]] || (( $(rank_of "$commit_bump") > $(rank_of "$bump") )); then
              bump="$commit_bump"
            fi
            echo "  · ${sha:0:7} ${subject}  [${commit_bump}]"
          done < <(git log --format='%H%x09%s' "${prev_tag}..HEAD")

          echo "Scanned $total_count commits since $prev_tag ($skipped_count skipped)."

          if [[ "$has_non_skip_commit" == "false" ]]; then
            echo "::error::No releasable commits since $prev_tag — nothing to release."
            exit 1
          fi

          bump="${bump:-patch}"
          prev_major=$(echo "$prev_tag" | sed 's/^v//' | cut -d. -f1)
          prev_minor=$(echo "$prev_tag" | sed 's/^v//' | cut -d. -f2)
          prev_patch=$(echo "$prev_tag" | sed 's/^v//' | cut -d. -f3)

          case "$bump" in
            major) version="v$((prev_major + 1)).0.0" ;;
            minor) version="v${prev_major}.$((prev_minor + 1)).0" ;;
            patch) version="v${prev_major}.${prev_minor}.$((prev_patch + 1))" ;;
          esac

          new_major=$(echo "$version" | sed 's/^v//' | cut -d. -f1)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=v${new_major}" >> "$GITHUB_OUTPUT"
          echo "Version: $version — ${bump} bump from $prev_tag"

  build-server:
    name: Build Server (${{ matrix.platform }})
    needs: version
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: ${{ needs.version.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply branding
        uses: ./.github/actions/apply-branding
        with:
          version: ${{ needs.version.outputs.version }}

      - name: Prepare platform pair
        id: prepare
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "platform-pair=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: server/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            DEVICE=cpu
            BUILD_ID=${{ github.run_id }}
            BUILD_SOURCE_REF=${{ needs.version.outputs.version }}
            BUILD_SOURCE_COMMIT=${{ needs.version.outputs.sha }}
          outputs: type=image,"name=ghcr.io/open-noodle/gallery-server",push-by-digest=true,name-resolution=short,push=true
          cache-from: type=gha,scope=server-${{ steps.prepare.outputs.platform-pair }}
          cache-to: type=gha,scope=server-${{ steps.prepare.outputs.platform-pair }},mode=max

      - name: Export digest
        run: | # zizmor: ignore[template-injection]
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: server-digests-${{ steps.prepare.outputs.platform-pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-server:
    name: Merge Server Manifest
    needs: [version, build-server]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: server-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ghcr.io/open-noodle/gallery-server
          VERSION: ${{ needs.version.outputs.version }}
          MAJOR: ${{ needs.version.outputs.major }}
        run: |
          tags="-t ${IMAGE}:${VERSION} -t ${IMAGE}:${MAJOR} -t ${IMAGE}:release"
          sources=$(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools create ${tags} ${sources}

  build-ml:
    name: Build ML ${{ matrix.device }} (${{ matrix.platform }})
    needs: version
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: cpu
            platform: linux/amd64
            runner: ubuntu-latest
          - device: cpu
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - device: cuda
            platform: linux/amd64
            runner: ubuntu-latest
          - device: openvino
            platform: linux/amd64
            runner: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: ${{ needs.version.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply branding
        uses: ./.github/actions/apply-branding
        with:
          version: ${{ needs.version.outputs.version }}

      - name: Prepare platform pair
        id: prepare
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "platform-pair=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: machine-learning
          file: machine-learning/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            DEVICE=${{ matrix.device }}
          outputs: type=image,"name=ghcr.io/open-noodle/gallery-ml",push-by-digest=true,name-resolution=short,push=true
          cache-from: type=gha,scope=ml-${{ matrix.device }}-${{ steps.prepare.outputs.platform-pair }}
          cache-to: type=gha,scope=ml-${{ matrix.device }}-${{ steps.prepare.outputs.platform-pair }},mode=max

      - name: Export digest
        run: | # zizmor: ignore[template-injection]
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ml-${{ matrix.device }}-digests-${{ steps.prepare.outputs.platform-pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-ml:
    name: Merge ML Manifest (${{ matrix.device }})
    needs: [version, build-ml]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - device: cpu
            suffix: ''
          - device: cuda
            suffix: '-cuda'
          - device: openvino
            suffix: '-openvino'
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: ml-${{ matrix.device }}-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ghcr.io/open-noodle/gallery-ml
          VERSION: ${{ needs.version.outputs.version }}
          MAJOR: ${{ needs.version.outputs.major }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          tags="-t ${IMAGE}:${VERSION}${SUFFIX} -t ${IMAGE}:${MAJOR}${SUFFIX} -t ${IMAGE}:release${SUFFIX}"
          sources=$(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools create ${tags} ${sources}

  tag:
    name: Create Git Tag and GitHub Release
    needs: [version, merge-server, merge-ml]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ needs.version.outputs.sha }}

      - name: Create tags
        env:
          VERSION: ${{ needs.version.outputs.version }}
          SHA: ${{ needs.version.outputs.sha }}
        run: |
          major=$(echo "$VERSION" | sed 's/^v//' | cut -d. -f1)

          # -f on all three makes re-runs idempotent if a prior attempt
          # pushed the tag before failing downstream.
          git tag -f "$VERSION" "$SHA"
          git tag -f "v${major}" "$SHA"
          git tag -f "release" "$SHA"

          git push origin "$VERSION" "v${major}" "release" --force

      - name: Create GitHub Release
        env:
          VERSION: ${{ needs.version.outputs.version }}
          SHA: ${{ needs.version.outputs.sha }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          upstream_version=$(jq -r '.upstream.version' branding/config.json)

          # Find the most recent previous release for the APK link. We just
          # pushed $VERSION, so skip it in the sorted list.
          prev_tag=$(git tag --list 'v*.*.*' --sort=-version:refname | grep -Fvx "$VERSION" | head -n1)

          notes="Based on [Immich v${upstream_version}](https://github.com/immich-app/immich/releases/tag/v${upstream_version})"

          if [[ -n "$prev_tag" ]]; then
            notes+=$'\n\n> **Server-only release.** No mobile changes. For the Android APK, see ['"$prev_tag"'](https://github.com/'"$REPO"'/releases/tag/'"$prev_tag"').'

            all_commits=$(git log --pretty=format:'%s' "${prev_tag}..${SHA}" 2>/dev/null)

            gallery_commits=$(echo "$all_commits" | while IFS= read -r line; do
              [[ -z "$line" ]] && continue
              pr_num=$(echo "$line" | grep -oP '\(#\K[0-9]+(?=\))' | head -1)
              if [[ -z "$pr_num" || "$pr_num" -lt 1000 ]]; then
                echo "- $line"
              fi
            done)

            upstream_commits=$(echo "$all_commits" | while IFS= read -r line; do
              [[ -z "$line" ]] && continue
              pr_num=$(echo "$line" | grep -oP '\(#\K[0-9]+(?=\))' | head -1)
              if [[ -n "$pr_num" && "$pr_num" -ge 1000 ]]; then
                echo "- $line"
              fi
            done)

            if [[ -n "$upstream_commits" ]]; then
              printf -v notes '%s\n\n<details>\n<summary>Upstream commits</summary>\n\n%s\n\n</details>' "$notes" "$upstream_commits"
            elif [[ -n "$gallery_commits" ]]; then
              printf -v notes '%s\n\n## Changes\n\n%s' "$notes" "$gallery_commits"
            fi
          fi

          gh release create "$VERSION" \
            --repo "$REPO" \
            --target "$SHA" \
            --title "$VERSION" \
            --latest \
            --notes "$notes"

          echo "Released $VERSION (server-only)"

  publish-version-endpoint:
    name: Publish Version Endpoint
    needs: [version, tag]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::660432264815:role/noodle-prod-gallery-release-version-upload
          aws-region: eu-west-1

      - name: Build and upload version.json
        env:
          VERSION: ${{ needs.version.outputs.version }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version tag: $VERSION"
            exit 1
          fi

          published_at=""
          for attempt in 1 2 3; do
            published_at=$(gh release view "$VERSION" --repo "$REPO" --json publishedAt --jq .publishedAt 2>/dev/null || true)
            if [[ -n "$published_at" && "$published_at" != "null" ]]; then
              break
            fi
            echo "Attempt ${attempt}: could not read publishedAt, retrying in 5s..."
            sleep 5
          done
          if [[ -z "$published_at" || "$published_at" == "null" ]]; then
            echo "::error::Could not read publishedAt for release $VERSION after 3 attempts"
            exit 1
          fi

          printf '{"version":"%s","published_at":"%s"}' "$VERSION" "$published_at" > /tmp/gallery

          aws s3 cp /tmp/gallery s3://noodle-prod-version/gallery \
            --content-type "application/json; charset=utf-8" \
            --cache-control "public, max-age=300"

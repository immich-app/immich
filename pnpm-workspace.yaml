packages:
  - packages/**
  - docs
  - e2e
  - i18n
  - server
  - plugins
  - web
  - .github
  - packages/*
allowBuilds:
  '@nestjs/core': false
  '@parcel/watcher': false
  '@scarf/scarf': false
  '@swc/core': false
  bcrypt: true
  better-sqlite3: true
  canvas: false
  core-js: false
  cpu-features: false
  es5-ext: false
  esbuild: false
  msgpackr-extract: false
  protobufjs: false
  sharp: true
  ssh2: false
  utimes: false
  '@tailwindcss/oxide': true
  core-js-pure: false
  postman-code-generators: false
dedupePeerDependents: false
injectWorkspacePackages: true
minimumReleaseAgeExclude:
  - '@immich/ui@0.81.1'
  - '@futo-org/*'
overrides:
  canvas: 3.2.3
  sharp: ^0.34.5
packageExtensions:
  '@immich/ui':
    dependencies:
      tailwindcss: '>=4.1'
  '@nestjs/swagger':
    peerDependencies:
      typescript: '*'
  '@photo-sphere-viewer/equirectangular-video-adapter':
    dependencies:
      three: '*'
  '@photo-sphere-viewer/video-plugin':
    dependencies:
      three: '*'
  bcrypt:
    dependencies:
      node-addon-api: '*'
      node-gyp: '*'
  nestjs-kysely:
    dependencies:
      tslib: '*'
  nestjs-otel:
    dependencies:
      tslib: '*'
  sharp:
    dependencies:
      node-addon-api: '*'
      node-gyp: '*'
  tailwind-variants:
    dependencies:
      tailwindcss: '>=4.1'
preferWorkspacePackages: true
shamefullyHoist: false
verifyDepsBeforeRun: install

storage:
  upload:
    deleteLocalAfterUpload: true
  locations:
    originals: s3
    thumbnails: s3
    previews: s3
    encodedVideos: s3

ffmpeg:
  # Force transcoding all videos - required for S3/Glacier setup
  # Without this, videos already in acceptable format are skipped
  # and remain only in Glacier IR (not streamable)
  transcode: all
  # Target H.264 for broad compatibility
  targetVideoCodec: h264
  acceptedVideoCodecs:
    - h264
    - hevc
  targetAudioCodec: aac
  acceptedAudioCodecs:
    - aac
    - mp3
    - libopus
  # 720p is good balance of quality/size for streaming
  targetResolution: '720'
  # CRF 23 is default, good quality
  crf: 23
  # Fast preset - good balance of encoding speed and file size
  preset: fast
  # No hardware acceleration on Fly.io shared CPUs
  accel: disabled

job:
  backgroundTask:
    concurrency: 15
  smartSearch:
    concurrency: 6
  metadataExtraction:
    concurrency: 15
  faceDetection:
    concurrency: 6
  search:
    concurrency: 15
  sidecar:
    concurrency: 15
  library:
    concurrency: 15
  migration:
    concurrency: 15
  assetThumbnailGeneration:
    concurrency: 25
  personThumbnailGeneration:
    concurrency: 6
  videoConversion:
    concurrency: 6
  notification:
    concurrency: 15
  ocr:
    concurrency: 3
  workflow:
    concurrency: 15
  s3Upload:
    concurrency: 15
  encryption:
    concurrency: 6

oauth:
  enabled: true
  issuerUrl: https://accounts.google.com
  clientId: ${OAUTH_CLIENT_ID}
  clientSecret: ${OAUTH_CLIENT_SECRET}
  buttonText: Login with Google
  autoRegister: true
  autoLaunch: false
  scope: openid email profile

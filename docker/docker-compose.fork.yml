#
# Fork deployment compose for Wintlink/immich
#
# This file builds custom Immich server + ML images from the source in this
# repository, instead of pulling ghcr.io/immich-app/* release images.
#
# Usage on your server:
#   git clone https://github.com/Wintlink/immich.git
#   cd immich
#   cp docker/example.env .env        # then edit .env with your paths
#   docker compose -f docker/docker-compose.fork.yml up -d --build
#
# Volume paths mirror the stock docker-compose.yml (UPLOAD_LOCATION + DB_DATA_LOCATION)
# so you can migrate from a vanilla Immich install without moving any data.
#

name: immich

services:
  immich-server:
    container_name: immich_server
    image: immich-server-wintlink:latest
    build:
      context: ../
      dockerfile: server/Dockerfile
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
      # External library: point this at your photo tree (read-only).
      # Then declare /mnt/media/famille as an external library in the Immich UI.
      - ${EXTERNAL_LIBRARY_PATH}:/mnt/media/famille:ro
    env_file:
      - ../.env
    ports:
      - '2283:2283'
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    image: immich-machine-learning-wintlink:latest
    build:
      context: ../machine-learning
      dockerfile: Dockerfile
      args:
        - DEVICE=cpu
    volumes:
      - model-cache:/cache
    env_file:
      - ../.env
    restart: always
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:8-bookworm@sha256:fea8b3e67b15729d4bb70589eb03367bab9ad1ee89c876f54327fc7c6e618571
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:32324a2f41df5de9efe1af166b7008c3f55646f8d0e00d9550c16c9822366b4a
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    healthcheck:
      disable: false

  # Optional: auto-create albums from folder names under EXTERNAL_LIBRARY_PATH.
  # Remove this block if you don't need it.
  immich-folder-album-creator:
    container_name: immich_folder_album_creator
    image: salvoxia/immich-folder-album-creator:latest
    restart: unless-stopped
    environment:
      API_URL: http://immich-server:2283/api
      API_KEY: ${ALBUM_CREATOR_API_KEY}
      ROOT_PATH: /mnt/media/famille
      ALBUM_LEVELS: "1,3"
      ALBUM_LEVEL_SEPARATOR: " - "
      CRON_EXPRESSION: "0 * * * *"
      UNATTENDED: 1
      TZ: ${TZ:-Europe/Paris}
    depends_on:
      - immich-server

volumes:
  model-cache:
